--- 
- name: Create vms for satellite
  hosts: kvm_host 
  tags: [provision]
  become: true 

  tasks:
    - name: Ensure kickstart files exist where libvirt can grab them 
      ansible.builtin.template:
        src: "ks/{{ item }}" 
        dest: "/var/lib/libvirt/boot/{{ item }}"
        owner: qemu 
        group: qemu 
        mode: "0600"
      loop: 
        - "rhel8.10.ks"
        - "rhel9.7.ks"
        - "rhel10.1.ks"

    - name: Create vms for satellite
      community.libvirt.virt_install:
        name: "{{ item.key }}"
        state: present
        memory: "{{ item.value.vm_memory }}"
        vcpus: "{{ item.value.vm_vcpus }}"
        location: "/var/lib/libvirt/images/{{ item.value.vm_install_iso }}"
        disks:
          - path: "/var/lib/libvirt/images/{{ item.key }}.qcow2"
            size: "{{ item.value.vm_disk_size | default('30') }}"
        osinfo:
          name: "{{ item.value.vm_osinfo_name }}"
        graphics:
          type: vnc
        networks:
          - bridge: bridge0
            model:
              type: virtio  
            mac:
              address: "{{ item.value.vm_mac_address }}"
        initrd_inject: "/var/lib/libvirt/boot/{{ item.value.vm_kickstart_file }}"
        extra_args: "inst.ks=file://{{ item.value.vm_kickstart_file }}"           
      loop: "{{ satellite_systems | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Wait for kickstart to complete and shutdown vms
      community.libvirt.virt:
        name: "{{ item.key }}"
        command: status
      register: vm_status
      until: vm_status.status == 'shutdown'
      retries: 20
      delay: 60
      loop: "{{ satellite_systems | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      failed_when: false # <- added to try to remedy intermittent error shown below:
      # FAILED - RETRYING: [kvm_host]: Wait for kickstart to complete and shutdown vms (20 retries left).
      # fatal: [kvm_host]: FAILED! => {"msg": "The conditional check 'vm_status.status == 'shutdown'' failed. 
      # The error was: error while evaluating conditional (vm_status.status == 'shutdown'): 'dict object' has 
      # no attribute 'status'. 'dict object' has no attribute 'status'"}

    - name: Start up the VMs
      community.libvirt.virt:
        name: "{{ item.key }}"
        state: running
      loop: "{{ satellite_systems | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Refresh dynamic inventory
      ansible.builtin.meta:
        refresh_inventory
